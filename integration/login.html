<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Musicca - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css"
      rel="stylesheet"
    />
    <link href="assets/stylesheets/output.css" rel="stylesheet" />
  </head>

  <body>
    <header>
      <div>
        <div>
          <img src="./assets/img/musicca-logo.png" alt="musicca logo" />
          <ul>
            <li>Exercises</li>
            <li>Lessons</li>
            <li class="active-link">About</li>
          </ul>
        </div>
        <div>
          <button>Create account</button>
          <button>
            <a href="http://localhost:8000/integration/login.html">Log in</a>
          </button>
        </div>
      </div>
    </header>
    <main id="login-main">
      <form action="/register" method="post">
        <h1>hello world</h1>
        <input type="email" name="username" placeholder="Email" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit">Log in</button>
      </form>
    </main>
  </body>
</html>
